# rules.yaml — Empresa de Servicios
# Versión ampliada: cubre todas las categorías del modelo ML + casos de servicios
#
# Responsabilidades de este archivo:
#   - set_area  → área de dependencia responsable (solo la primera regla que haga match)
#   - add_tags  → palabras clave acumuladas (siempre se suman, nunca sobreescriben)
#
# Operadores:
#   OR  → basta con que UN keyword aparezca en el texto (default)
#   AND → TODOS los keywords deben aparecer
#
# Prioridad: menor número = se evalúa primero.
# set_area solo se aplica si el área aún no fue asignada.

rules:

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Fraude y Seguridad  (prioridad 1–5 — siempre primero)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: fraude_cuenta_comprometida
    priority: 1
    conditions:
      operator: OR
      items:
        - contains: [hackearon, cuenta hackeada, acceso no autorizado, me clonaron,
                     cambiaron mi contraseña, cambiaron mi correo, ingresaron a mi cuenta,
                     alguien entró a mi cuenta, cuenta comprometida, cuenta vulnerada]
    actions:
      set_area: "Fraude y seguridad"
      add_tags: [cuenta hackeada, acceso no autorizado, urgente]

  - id: fraude_cargo_no_reconocido
    priority: 2
    conditions:
      operator: OR
      items:
        - contains: [cargo desconocido, compra no autorizada, no reconozco el cobro,
                     no realicé esta compra, no autoricé, compra que no hice,
                     pedido que no hice, transacción no reconocida, cargo no reconocido]
    actions:
      set_area: "Fraude y seguridad"
      add_tags: [cargo no reconocido, fraude, urgente]

  - id: fraude_estafa_robo
    priority: 3
    conditions:
      operator: OR
      items:
        - contains: [fraude, estafa, robo, me robaron, me estafaron, clonaron,
                     phishing, suplantación, datos robados, información robada]
    actions:
      set_area: "Fraude y seguridad"
      add_tags: [fraude, seguridad, urgente]

  - id: fraude_phishing
    priority: 4
    conditions:
      operator: OR
      items:
        - contains: [correo falso, mensaje sospechoso, link sospechoso, enlace falso,
                     me pidieron la clave, me pidieron mis datos, intento de fraude,
                     correo de phishing, whatsapp falso, llamada sospechosa]
    actions:
      set_area: "Fraude y seguridad"
      add_tags: [phishing, intento de fraude, seguridad]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Servicios legales  (prioridad 5–9)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: legal_acciones_formales
    priority: 5
    conditions:
      operator: OR
      items:
        - contains: [tutela, demanda, sic, superintendencia de industria,
                     derecho de petición, acción legal, denuncia formal,
                     juzgado, proceso judicial, ente de control, defensoría,
                     procuraduría, contraloría, litigio, arbitraje]
    actions:
      set_area: "Servicios legales"
      add_tags: [acción legal, SIC, ente de control]

  - id: legal_abogado
    priority: 6
    conditions:
      operator: OR
      items:
        - contains: [abogado, asesoría legal, consulta legal, recurso legal,
                     impugnación, apelación, recurso de reposición]
    actions:
      set_area: "Servicios legales"
      add_tags: [asesoría legal, recurso]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Cartera  (prioridad 10–19)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: cartera_cobro_duplicado
    priority: 10
    conditions:
      operator: OR
      items:
        - contains: [cobro duplicado, me cobraron dos veces, cobro doble,
                     doble cobro, cobrado dos veces, doble cargo, dos cargos iguales,
                     dos descuentos iguales]
    actions:
      set_area: "Cartera"
      add_tags: [cobro duplicado, facturación incorrecta]

  - id: cartera_valor_incorrecto
    priority: 11
    conditions:
      operator: OR
      items:
        - contains: [valor incorrecto, me descontaron de más, precio mal cobrado,
                     me cobraron más, cargo adicional, cobro erróneo, factura incorrecta,
                     valor diferente, precio diferente al carrito, diferencia en el cobro,
                     no corresponde al valor, monto incorrecto]
    actions:
      set_area: "Cartera"
      add_tags: [valor incorrecto, facturación]

  - id: cartera_descuento_no_aplicado
    priority: 12
    conditions:
      operator: OR
      items:
        - contains: [descuento no aplicado, cupón no funcionó, código no funciona,
                     no se aplicó el descuento, descuento no se reflejó,
                     precio completo sin descuento, cupón rechazado, código inválido]
    actions:
      set_area: "Cartera"
      add_tags: [descuento no aplicado, cupón]

  - id: cartera_reembolso
    priority: 13
    conditions:
      operator: OR
      items:
        - contains: [reembolso, devuélvanme el dinero, quiero mi dinero de vuelta,
                     devolución de dinero, no han procesado mi devolución,
                     reversar pago, reintegro, revertir cobro, devolver el valor,
                     acreditar el dinero, dinero no ha llegado, reembolso pendiente]
    actions:
      set_area: "Cartera"
      add_tags: [reembolso, devolución de dinero]

  - id: cartera_factura_documento
    priority: 14
    conditions:
      operator: OR
      items:
        - contains: [necesito factura, solicito factura, factura electrónica,
                     comprobante de pago, documento de compra, certificado de compra,
                     factura a nombre de, nit en la factura, factura empresarial,
                     soporte de pago, certificado de pago, recibo de pago,
                     factura para contabilidad, factura para gastos]
    actions:
      set_area: "Cartera"
      add_tags: [factura, comprobante, documentos]

  - id: cartera_cargo_no_justificado
    priority: 15
    conditions:
      operator: OR
      items:
        - contains: [cargo que no reconozco, cobro que no entiendo, ítem desconocido,
                     cargo sin explicación, por qué me cobraron, a qué corresponde ese cargo]
    actions:
      set_area: "Cartera"
      add_tags: [cargo no justificado, facturación]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Logística  (prioridad 20–39)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: logistica_pedido_perdido
    priority: 20
    conditions:
      operator: OR
      items:
        - contains: [pedido perdido, paquete perdido, pedido extraviado, paquete extraviado,
                     no saben dónde está, no aparece en el sistema, perdieron mi pedido,
                     guía sin movimiento, sin rastro del pedido]
    actions:
      set_area: "Logística"
      add_tags: [pedido extraviado, urgente]

  - id: logistica_no_entrega
    priority: 21
    conditions:
      operator: OR
      items:
        - contains: [no llegó, no ha llegado, nunca llegó, no recibí, no me llegó,
                     no entregaron, no han entregado, sigo sin recibir, jamás llegó,
                     nunca recibí, no me entregaron]
    actions:
      set_area: "Logística"
      add_tags: [pedido no entregado, entrega]

  - id: logistica_entrega_fallida
    priority: 22
    conditions:
      operator: OR
      items:
        - contains: [dice entregado pero no llegó, marcaron entregado sin entregar,
                     no firmé, nadie entregó, dice que lo dejaron, repartidor no tocó,
                     dejaron en portería sin avisar, entrega fallida, intento fallido]
    actions:
      set_area: "Logística"
      add_tags: [entrega fallida, entrega incorrecta]

  - id: logistica_retraso
    priority: 23
    conditions:
      operator: OR
      items:
        - contains: [llegó tarde, tardó mucho, se demoró, fuera del plazo,
                     pasó la fecha prometida, días de retraso, sigue sin llegar,
                     fecha de entrega vencida, ya pasó la fecha, entrega demorada,
                     más tiempo de lo normal, demora en la entrega]
    actions:
      set_area: "Logística"
      add_tags: [entrega tardía, retraso]

  - id: logistica_rastreo
    priority: 24
    conditions:
      operator: OR
      items:
        - contains: [dónde está mi pedido, estado de mi pedido, número de guía,
                     rastrear pedido, seguimiento, cuándo llega, cuándo me llega,
                     link de rastreo no funciona, no puedo rastrear, guía inactiva,
                     número de tracking, información de envío]
    actions:
      set_area: "Logística"
      add_tags: [rastreo, estado de pedido]

  - id: logistica_cancelacion
    priority: 25
    conditions:
      operator: OR
      items:
        - contains: [cancelar pedido, quiero cancelar, anular compra, desistir,
                     ya no quiero el pedido, cancelar la orden, anular el pedido,
                     cancelación de compra, reversar la compra]
    actions:
      set_area: "Logística"
      add_tags: [cancelación, anulación]

  - id: logistica_producto_incorrecto
    priority: 26
    conditions:
      operator: OR
      items:
        - contains: [enviaron el producto equivocado, referencia incorrecta,
                     talla incorrecta, color diferente, no era lo que pedí,
                     me mandaron otro producto, no corresponde a mi pedido,
                     producto diferente, artículo equivocado, me llegó otro]
    actions:
      set_area: "Logística"
      add_tags: [producto incorrecto, error de envío]

  - id: logistica_transportadora
    priority: 27
    conditions:
      operator: OR
      items:
        - contains: [empresa de mensajería, transportadora, mensajero, repartidor,
                     servicio de entrega, courier, operador logístico, empresa de envíos]
    actions:
      set_area: "Logística"
      add_tags: [transportadora, servicio de entrega]

  - id: logistica_devolucion_fisica
    priority: 28
    conditions:
      operator: OR
      items:
        - contains: [devolver el producto, devolución del artículo, enviar de vuelta,
                     retorno del producto, punto de devolución, recoger el producto,
                     programar recogida, pickup de devolución]
    actions:
      set_area: "Logística"
      add_tags: [devolución física, retorno]

  - id: logistica_cobertura
    priority: 29
    conditions:
      operator: OR
      items:
        - contains: [hacen entrega en, envían a, cobertura de envío, mi ciudad no aparece,
                     municipio no disponible, zona de entrega, no llegan a mi zona,
                     entrega a domicilio disponible, costo de envío]
    actions:
      set_area: "Logística"
      add_tags: [cobertura, zona de entrega]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Garantías  (prioridad 40–49)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: garantias_producto_defectuoso
    priority: 40
    conditions:
      operator: OR
      items:
        - contains: [producto dañado, llegó roto, defectuoso, llegó en mal estado,
                     está partido, no enciende, falla desde que llegó, vino golpeado,
                     defecto de fábrica, llegó rayado, llegó con golpes, pieza rota,
                     empaque dañado, artículo roto, llegó quebrado]
    actions:
      set_area: "Garantías"
      add_tags: [producto defectuoso, calidad]

  - id: garantias_falla_tecnica
    priority: 41
    conditions:
      operator: OR
      items:
        - contains: [no funciona, dejó de funcionar, falla técnica, falla intermitente,
                     se apaga solo, no enciende, no prende, presentó falla, tiene un defecto,
                     mal funcionamiento, funcionamiento deficiente]
    actions:
      set_area: "Garantías"
      add_tags: [falla técnica, mal funcionamiento]

  - id: garantias_solicitud_cobertura
    priority: 42
    conditions:
      operator: OR
      items:
        - contains: [garantía, bajo garantía, dentro de garantía, período de garantía,
                     hacer válida la garantía, activar garantía, cubrir garantía,
                     garantía del fabricante, garantía vigente, tengo garantía]
    actions:
      set_area: "Garantías"
      add_tags: [garantía, cobertura]

  - id: garantias_servicio_tecnico
    priority: 43
    conditions:
      operator: OR
      items:
        - contains: [reparación, servicio técnico, soporte técnico, técnico,
                     centro de servicio, punto de servicio, taller, revisión técnica]
    actions:
      set_area: "Garantías"
      add_tags: [servicio técnico, reparación]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Atención al cliente  (prioridad 50–69)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: atencion_queja_agente
    priority: 50
    conditions:
      operator: OR
      items:
        - contains: [mala atención, mal servicio, agente grosero, fue irrespetuoso,
                     no me ayudaron, pésima atención, trato irrespetuoso, muy malo el servicio,
                     agente ineficiente, agente no solucionó, me trataron mal,
                     agente no supo, agente incompetente, queja por el agente]
    actions:
      set_area: "Atención al cliente"
      add_tags: [queja agente, mala atención]

  - id: atencion_espera_excesiva
    priority: 51
    conditions:
      operator: OR
      items:
        - contains: [tiempo de espera, me dejaron esperando, llevo esperando,
                     hora de espera, minutos en línea, no me atienden,
                     fila de espera, demasiado tiempo en espera, chat no responde,
                     nadie responde, sin respuesta desde hace]
    actions:
      set_area: "Atención al cliente"
      add_tags: [tiempo de espera, atención demorada]

  - id: atencion_caso_sin_resolver
    priority: 52
    conditions:
      operator: OR
      items:
        - contains: [no resolvieron mi caso, no me solucionaron, sigue sin solución,
                     mismo problema de antes, caso sin cerrar, pendiente de solución,
                     me transfieren a otro, me piden repetir todo, caso escalado sin respuesta,
                     prometieron llamarme y no, no han dado respuesta]
    actions:
      set_area: "Atención al cliente"
      add_tags: [caso sin resolver, seguimiento]

  - id: atencion_publicidad_engañosa
    priority: 53
    conditions:
      operator: OR
      items:
        - contains: [precio diferente, no era el precio, oferta falsa, engaño,
                     publicidad engañosa, condiciones distintas, no aplica lo que decían,
                     me engañaron con el precio, condiciones diferentes a lo ofrecido,
                     información falsa en la página, descripción falsa]
    actions:
      set_area: "Atención al cliente"
      add_tags: [publicidad engañosa, precio]

  - id: atencion_felicitacion
    priority: 54
    conditions:
      operator: OR
      items:
        - contains: [felicitaciones, excelente servicio, muy buena atención,
                     quedé muy satisfecho, encantado con el servicio, 100 recomendado,
                     los felicito, gracias por la atención, muy buen servicio,
                     servicio excelente, atención impecable, recomendaría]
    actions:
      set_area: "Atención al cliente"
      add_tags: [felicitación, satisfacción positiva]

  - id: atencion_sugerencia
    priority: 55
    conditions:
      operator: OR
      items:
        - contains: [sugiero que, quisiera sugerir, sería bueno que, recomendaría que,
                     podrían implementar, sería útil, propuesta de mejora, feedback,
                     sugerencia de mejora]
    actions:
      set_area: "Atención al cliente"
      add_tags: [sugerencia, mejora]

  - id: atencion_sugerencia_supervisor
    priority: 56
    conditions:
      operator: OR
      items:
        - contains: [hablar con un supervisor, escalar mi caso, quiero hablar con el jefe,
                     comunicarme con gerencia, queja formal, escalamiento,
                     quiero escalar, supervisor por favor]
    actions:
      set_area: "Atención al cliente"
      add_tags: [escalamiento, supervisor]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Producto  (prioridad 60–69)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: producto_disponibilidad
    priority: 60
    conditions:
      operator: OR
      items:
        - contains: [disponibilidad, hay en stock, tallas disponibles, en existencia,
                     disponible en mi talla, cuándo habrá stock, agotado,
                     cuándo entra inventario, cuándo lo reponen, sin stock]
    actions:
      set_area: "Producto"
      add_tags: [disponibilidad, inventario]

  - id: producto_informacion_tecnica
    priority: 61
    conditions:
      operator: OR
      items:
        - contains: [características del producto, especificaciones, ficha técnica,
                     colores disponibles, referencia disponible, materiales del producto,
                     dimensiones del producto, peso del producto, compatibilidad,
                     manual del producto, instrucciones de uso]
    actions:
      set_area: "Producto"
      add_tags: [información técnica, especificaciones]

  - id: producto_comparacion
    priority: 62
    conditions:
      operator: OR
      items:
        - contains: [diferencia entre, cuál es mejor, comparar productos,
                     qué producto me recomienda, alternativas, opciones disponibles]
    actions:
      set_area: "Producto"
      add_tags: [consulta de producto, comparación]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Fidelización  (prioridad 70–79)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: fidelizacion_puntos
    priority: 70
    conditions:
      operator: OR
      items:
        - contains: [puntos acumulados, canjear puntos, programa de lealtad,
                     programa de fidelización, membresía, redimir puntos,
                     cuántos puntos tengo, puntos por vencer, saldo de puntos,
                     puntos no se actualizaron, no me acreditaron puntos]
    actions:
      set_area: "Fidelización"
      add_tags: [fidelización, puntos]

  - id: fidelizacion_beneficios
    priority: 71
    conditions:
      operator: OR
      items:
        - contains: [beneficios del programa, nivel del programa, categoría cliente,
                     cliente premium, cliente vip, beneficios exclusivos, descuento por membresía,
                     cómo subir de nivel, nivel platinum, nivel gold, nivel silver]
    actions:
      set_area: "Fidelización"
      add_tags: [beneficios, nivel de membresía]

  - id: fidelizacion_referidos
    priority: 72
    conditions:
      operator: OR
      items:
        - contains: [programa de referidos, referir a un amigo, código de referido,
                     bono por referido, gané puntos por referir, mi código de referidos]
    actions:
      set_area: "Fidelización"
      add_tags: [referidos, bono]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Atención al cliente — Datos personales  (prioridad 80–89)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: datos_personales_contacto
    priority: 80
    conditions:
      operator: OR
      items:
        - contains: [actualizar dirección, cambiar correo, modificar teléfono,
                     actualizar datos, cambiar datos, nueva dirección de entrega,
                     cambiar número, nuevo correo, actualizar perfil, datos desactualizados]
    actions:
      set_area: "Atención al cliente"
      add_tags: [actualización de datos, datos personales]

  - id: datos_personales_cuenta
    priority: 81
    conditions:
      operator: OR
      items:
        - contains: [cambiar contraseña, olvidé mi contraseña, recuperar cuenta,
                     no puedo iniciar sesión, cuenta bloqueada, restablecer clave,
                     no recuerdo mi clave, no puedo acceder, acceso a mi cuenta]
    actions:
      set_area: "Atención al cliente"
      add_tags: [acceso a cuenta, contraseña]

  - id: datos_personales_eliminacion
    priority: 82
    conditions:
      operator: OR
      items:
        - contains: [eliminar mi cuenta, borrar mis datos, derecho al olvido,
                     cancelar mi cuenta, dar de baja, no quiero seguir registrado]
    actions:
      set_area: "Atención al cliente"
      add_tags: [eliminación de cuenta, datos personales]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Tecnología / Plataforma  (prioridad 90–99)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: tech_falla_plataforma
    priority: 90
    conditions:
      operator: OR
      items:
        - contains: [la página no carga, error en la plataforma, la app no funciona,
                     error del sistema, fallo técnico, la web está caída,
                     no me deja comprar, error al pagar, botón no funciona,
                     página se congela, app se cierra, error 500, error 404]
    actions:
      set_area: "Tecnología"
      add_tags: [falla plataforma, error técnico]

  - id: tech_pago_fallido
    priority: 91
    conditions:
      operator: OR
      items:
        - contains: [pago fallido, no procesó el pago, error al pagar, pago rechazado,
                     tarjeta rechazada, no acepta mi tarjeta, error en el checkout,
                     no pude completar el pago, transacción rechazada, pago no procesado]
    actions:
      set_area: "Tecnología"
      add_tags: [pago fallido, error de pago]

  - id: tech_app_movil
    priority: 92
    conditions:
      operator: OR
      items:
        - contains: [aplicación móvil, app de celular, app no abre, app se traba,
                     actualizar la app, versión de la app, descarga de la app,
                     instalar la aplicación, app android, app iphone]
    actions:
      set_area: "Tecnología"
      add_tags: [app móvil, aplicación]

  - id: tech_notificaciones
    priority: 93
    conditions:
      operator: OR
      items:
        - contains: [no recibí el correo, correo no llegó, no me enviaron confirmación,
                     correo de confirmación, notificación no llegó, sms no llegó,
                     no me avisaron, sin notificación de envío]
    actions:
      set_area: "Tecnología"
      add_tags: [notificaciones, comunicación]

  # ══════════════════════════════════════════════════════════════════════════════
  # ÁREA: Comercial  (prioridad 100–109)
  # ══════════════════════════════════════════════════════════════════════════════

  - id: comercial_promociones
    priority: 100
    conditions:
      operator: OR
      items:
        - contains: [promoción, descuento, oferta, cupón, código de descuento,
                     precio especial, sale, temporada de descuentos, black friday,
                     cyber monday, temporada]
    actions:
      set_area: "Comercial"
      add_tags: [promoción, descuento]

  - id: comercial_precio
    priority: 101
    conditions:
      operator: OR
      items:
        - contains: [precio, valor del producto, cuánto cuesta, tarifa, costo,
                     precio de lista, precio de venta, precio al público]
    actions:
      set_area: "Comercial"
      add_tags: [precio, consulta comercial]

  - id: comercial_pedido_empresarial
    priority: 102
    conditions:
      operator: OR
      items:
