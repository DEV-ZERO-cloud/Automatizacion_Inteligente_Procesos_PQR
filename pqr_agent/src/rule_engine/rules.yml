rules:
    #Estructura de la rule 34
  - id: "R001"
    name: "Reclamo por facturación"
    priority: 1
    conditions:
      operator: OR
      items:
        - field: text
          contains: ["cobro incorrecto", "me cobraron de más", "factura incorrecta", "doble cobro"]
    actions:
      set_category: "Reclamo"
      add_tags: ["facturación", "cobro"]
      set_priority: "alta"